<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="陀螺賽事">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#e11d48">
<title>戰鬥陀螺賽事管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --red:#e11d48;--red-lt:#fff1f2;
  --green:#16a34a;--blue:#2563eb;--orange:#ea580c;--purple:#7c3aed;--yellow:#ca8a04;
  --bg:#f2f2f7;--card:#fff;--text:#1c1c1e;--text2:#636366;--text3:#aeaeb2;
  --border:rgba(0,0,0,0.09);
  --tab-h:calc(54px + env(safe-area-inset-bottom,0px));
  --hdr-h:calc(56px + env(safe-area-inset-top,0px));
  --r:14px;
}
html{height:-webkit-fill-available;}body{height:100%;min-height:-webkit-fill-available;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;min-height:-webkit-fill-available;max-width:500px;margin:0 auto;background:var(--bg);}
#hdr{height:var(--hdr-h);background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;padding:0 16px 12px;position:sticky;top:0;z-index:20;padding-top:env(safe-area-inset-top,0);}
#hdr-back{background:none;border:none;font-size:17px;color:var(--red);cursor:pointer;padding:4px 0;min-width:64px;}
#hdr-title{font-size:17px;font-weight:700;text-align:center;flex:1;}
#hdr-right{background:none;border:none;font-size:15px;color:var(--red);cursor:pointer;padding:4px 0;min-width:64px;text-align:right;}
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;}
#tabs{height:var(--tab-h);background:var(--card);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0);}
.tab{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--text3);font-size:10px;font-weight:600;padding:6px 0 4px;}
.tab.on{color:var(--red);}
.tab-ic{font-size:24px;line-height:1;}
.fab{position:fixed;bottom:calc(var(--tab-h) + 16px);right:20px;width:56px;height:56px;border-radius:28px;background:var(--red);color:#fff;border:none;font-size:30px;cursor:pointer;box-shadow:0 4px 18px rgba(225,29,72,.45);display:flex;align-items:center;justify-content:center;z-index:30;transition:transform .1s;}
.fab:active{transform:scale(.93);}
.card{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.cl{padding:0 16px;display:flex;flex-direction:column;gap:8px;padding-bottom:8px;}
.crow{display:flex;align-items:center;padding:13px 16px;gap:12px;cursor:pointer;min-height:60px;transition:background .1s;}
.crow:active{background:var(--bg);}
.crow+.crow{border-top:1px solid var(--border);}
.av{width:44px;height:44px;border-radius:22px;background:var(--red-lt);color:var(--red);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;}
.t-h{font-size:16px;font-weight:700;}
.t-s{font-size:13px;color:var(--text2);margin-top:2px;}
.t-xs{font-size:11px;color:var(--text3);margin-top:2px;}
.chevron{color:var(--text3);font-size:18px;margin-left:4px;}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;}
.badge-upcoming{background:#dbeafe;color:#1e40af;}
.badge-ongoing{background:#fff7ed;color:#c2410c;}
.badge-completed{background:#dcfce7;color:#15803d;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:70px 24px;text-align:center;}
.em-ic{font-size:68px;opacity:.25;}
.em-t{font-size:18px;font-weight:700;color:var(--text2);}
.em-s{font-size:14px;color:var(--text3);}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:none;align-items:flex-end;}
#overlay.on{display:flex;}
#sheet{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 8px);}
.sh-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;}
.sh-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;}
.sh-title{font-size:17px;font-weight:700;}
.sh-cancel{font-size:15px;color:var(--text2);background:none;border:none;cursor:pointer;padding:4px;font-family:inherit;}
.sh-ok{font-size:15px;color:var(--red);font-weight:700;background:none;border:none;cursor:pointer;padding:4px;font-family:inherit;}
.sh-ok:disabled{opacity:.35;}
.f-sec{margin:0 16px 14px;}
.f-lbl{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;}
.f-inp{width:100%;padding:13px 14px;border-radius:10px;border:none;background:var(--bg);font-size:16px;color:var(--text);outline:none;font-family:inherit;}
.f-inp:focus{background:#eaeaf0;}
.stepper{display:flex;align-items:center;background:var(--bg);border-radius:10px;overflow:hidden;}
.stp-btn{width:48px;height:46px;border:none;background:none;font-size:24px;color:var(--red);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.stp-btn:disabled{color:var(--text3);}
.stp-val{flex:1;text-align:center;font-size:17px;font-weight:700;}
.psr{display:flex;align-items:center;padding:12px 16px;gap:12px;cursor:pointer;}
.psr:active{background:var(--bg);}
.psr+.psr{border-top:1px solid var(--border);}
.psr-chk{width:24px;height:24px;border-radius:12px;border:2px solid var(--text3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.psr-chk.on{background:var(--red);border-color:var(--red);}
.psr-chk.on::after{content:'✓';color:#fff;font-size:14px;font-weight:800;}
.btn-p{width:calc(100% - 32px);margin:0 16px;padding:15px;border-radius:var(--r);background:var(--red);color:#fff;border:none;font-size:17px;font-weight:700;cursor:pointer;transition:opacity .1s;font-family:inherit;}
.btn-p:disabled{opacity:.35;}
.btn-p:active{opacity:.8;}
.btn-ghost{background:none;border:none;color:var(--red);font-size:14px;cursor:pointer;padding:4px 8px;font-family:inherit;}
.infobox{margin:0 16px 12px;padding:10px 14px;background:#eff6ff;border-radius:10px;font-size:13px;color:#1d4ed8;display:flex;gap:8px;align-items:flex-start;}
.rnd-hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 16px 8px;}
.rnd-title{font-size:18px;font-weight:800;}
.rnd-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;}
.mc{background:var(--card);border-radius:var(--r);margin:0 16px 8px;padding:12px 14px;display:flex;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;transition:transform .1s;}
.mc:active{transform:scale(.98);}
.mc.ongoing{border:2px solid var(--orange);}
.mc.completed{border:2px solid rgba(22,163,74,.3);}
.mc.bye{cursor:default;opacity:.65;}
.mc-p{flex:1;text-align:center;}
.mc-name{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mc-score{font-size:38px;font-weight:900;line-height:1.1;}
.mc-score.win{color:var(--yellow);}
.mc-dots{display:flex;gap:3px;justify-content:center;margin-top:3px;}
.mc-dot{width:6px;height:6px;border-radius:3px;background:var(--border);}
.mc-dot.on{background:var(--red);}
.mc-div{width:44px;text-align:center;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;}
.mc-no{font-size:9px;color:var(--text3);font-weight:600;}
.vs{font-size:11px;font-weight:800;color:var(--text3);}
.w-banner{margin:16px;padding:22px 20px;border-radius:var(--r);background:linear-gradient(135deg,#fef9c3,#fde68a);border:1.5px solid rgba(202,138,4,.3);text-align:center;}
.adv-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin:4px 16px 8px;padding:15px;background:var(--red);color:#fff;border:none;border-radius:var(--r);font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(225,29,72,.3);font-family:inherit;}
.adv-btn:active{opacity:.85;}
.ssh{background:var(--card);padding:16px 14px;display:flex;align-items:center;border-bottom:1px solid var(--border);}
.ssh-p{flex:1;text-align:center;}
.ssh-name{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ssh-score{font-size:54px;font-weight:900;line-height:1;}
.ssh-score.win{color:var(--yellow);}
.ssh-mid{text-align:center;width:44px;}
.ssh-tl{font-size:10px;color:var(--text3);}
.ssh-tv{font-size:16px;font-weight:800;color:var(--text2);}
.scols{display:flex;gap:8px;padding:14px 12px 4px;}
.scol{flex:1;display:flex;flex-direction:column;gap:5px;}
.scol-name{text-align:center;font-size:12px;font-weight:800;padding:7px 4px;background:rgba(225,29,72,.08);border-radius:8px;color:var(--red);}
.sbtn{width:100%;border:none;border-radius:10px;cursor:pointer;padding:9px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:transform .1s;font-family:inherit;}
.sbtn:active{transform:scale(.91);}
.sb-em{font-size:20px;}
.sb-nm{font-size:10px;font-weight:800;line-height:1.2;text-align:center;}
.sb-pt{font-size:10px;opacity:.7;}
.s-survivor{background:rgba(22,163,74,.12);color:#15803d;}
.s-over{background:rgba(37,99,235,.12);color:#1d4ed8;}
.s-burst{background:rgba(234,88,12,.12);color:#c2410c;}
.s-xtreme{background:rgba(225,29,72,.12);color:#be123c;}
.s-custom{background:rgba(124,58,237,.12);color:#6d28d9;}
.hist-sec{padding:0 12px 24px;}
.hist-t{font-size:13px;font-weight:700;color:var(--text2);padding:10px 4px 8px;}
.hi{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--card);border-radius:10px;margin-bottom:5px;}
.hi-em{font-size:19px;}
.hi-inf{flex:1;}
.hi-pl{font-size:14px;font-weight:700;}
.hi-re{font-size:12px;color:var(--text2);}
.hi-pt{font-size:15px;font-weight:800;color:var(--green);}
.result{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px 24px;gap:14px;text-align:center;min-height:65vh;}
.r-win{font-size:30px;font-weight:900;}
.r-scores{display:flex;align-items:center;gap:24px;margin:4px 0;}
.rsp{text-align:center;}
.rsp-n{font-size:13px;color:var(--text2);}
.rsp-s{font-size:40px;font-weight:900;}
.rsp-s.win{color:var(--yellow);}
.search{margin:10px 16px 6px;padding:10px 14px;background:var(--card);border-radius:10px;border:none;font-size:15px;color:var(--text);width:calc(100% - 32px);outline:none;font-family:inherit;}
/* 循環賽對戰表格 */
.rr-wrap{margin:0 16px 8px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.rr-table{border-collapse:collapse;font-size:11px;width:100%;}
.rr-table th,.rr-table td{border:1px solid var(--border);text-align:center;padding:5px 3px;min-width:40px;}
.rr-table thead th{background:var(--bg);font-weight:800;font-size:10px;color:var(--text2);max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rr-table tbody th{background:var(--bg);font-weight:800;font-size:10px;color:var(--text2);text-align:left;padding-left:6px;max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rr-self{background:#f2f2f7;}
.rr-win{background:#dcfce7;color:#15803d;font-weight:800;}
.rr-lose{background:#fee2e2;color:#b91c1c;}
.rr-going{background:#fff7ed;color:#c2410c;}
.rr-wait{color:var(--text3);}
/* 循環賽 standings */
.st-card{margin:12px 16px 4px;background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.st-head{display:flex;align-items:center;padding:10px 14px;background:var(--red-lt);border-bottom:1px solid var(--border);}
.st-head-rank{width:28px;font-size:11px;font-weight:800;color:var(--text3);}
.st-head-name{flex:1;font-size:11px;font-weight:800;color:var(--text3);}
.st-head-w{width:44px;text-align:center;font-size:11px;font-weight:800;color:var(--text3);}
.st-head-p{width:52px;text-align:right;font-size:11px;font-weight:800;color:var(--text3);}
.st-row{display:flex;align-items:center;padding:11px 14px;border-top:1px solid var(--border);}
.st-row:first-child{border-top:none;}
.st-rank{width:28px;font-size:14px;font-weight:900;color:var(--text3);}
.st-rank.top{color:var(--yellow);}
.st-name{flex:1;font-size:14px;font-weight:700;}
.st-wins{width:44px;text-align:center;font-size:14px;font-weight:800;color:var(--red);}
.st-pts{width:52px;text-align:right;font-size:12px;color:var(--text2);}
/* 賽制選擇 */
.type-sel{display:flex;gap:8px;}
.type-btn{flex:1;padding:11px 4px;border-radius:10px;border:2px solid var(--border);background:var(--bg);font-size:13px;font-weight:700;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s;}
.type-btn.on{border-color:var(--red);background:var(--red-lt);color:var(--red);}
/* sync bar */
#sync-bar{position:fixed;top:0;left:0;right:0;text-align:center;font-size:12px;font-weight:700;padding:6px;z-index:100;transition:all .3s;}
#sync-bar.loading{background:#fff7ed;color:#c2410c;}
#sync-bar.ok{background:#dcfce7;color:#15803d;}
#sync-bar.err{background:#fee2e2;color:#b91c1c;}
#sync-bar.hidden{display:none;}
</style>
</head>
<body>
<div id="sync-bar" class="hidden">⏳ 連線中...</div>
<div id="app">
  <header id="hdr">
    <button id="hdr-back" onclick="goBack()" style="visibility:hidden">&#8249; 返回</button>
    <span id="hdr-title">&#9876; 陀螺賽事</span>
    <button id="hdr-right" onclick="hdrAction()" style="visibility:hidden"></button>
  </header>
  <div id="main"><div class="empty"><div class="em-ic">☁️</div><div class="em-t">連線中...</div><div class="em-s">正在載入雲端資料</div></div></div>
  <button id="fab" class="fab" style="display:none" onclick="fabClick()">+</button>

// ── Sync bar ──
function showSync(state,msg){var bar=document.getElementById('sync-bar');bar.className=state;bar.textContent=msg;if(state==='ok')setTimeout(function(){bar.className='hidden';},2000);}

// ── Save ──
function save(){
  db.ref('/').set({players:S.players,tournaments:S.tournaments})
    .then(function(){showSync('ok','☁️ 已同步');})
    .catch(function(e){showSync('err','❌ 同步失敗');});
}

// ── Firebase 正規化 ──
function toArr(v){
  if(!v)return[];
  if(Array.isArray(v))return v;
  return Object.keys(v).map(Number).sort(function(a,b){return a-b;}).map(function(k){return v[k];}).filter(function(x){return x!=null;});
}
function normData(data){
  var players=toArr(data.players);
  var tournaments=toArr(data.tournaments).map(function(t){
    if(!t)return null;
    var matches=toArr(t.matches).map(function(m){
      if(!m)return null;
      return Object.assign({},m,{scores:toArr(m.scores)});
    }).filter(Boolean);
    return Object.assign({},t,{matches:matches,pendingEntrants:toArr(t.pendingEntrants||[])});
  }).filter(Boolean);
  return{players:players,tournaments:tournaments};
}

// ── Utils ──
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=b[i];b[i]=b[j];b[j]=t;}return b;}
function calcAge(bd){var b=new Date(bd),n=new Date(),a=n.getFullYear()-b.getFullYear();if(n<new Date(n.getFullYear(),b.getMonth(),b.getDate()))a--;return a;}
function fmtD(iso){var d=new Date(iso);return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';}
function fmtDT(iso){var d=new Date(iso),M=d.getMonth()+1,D=d.getDate(),H=d.getHours(),Mi=d.getMinutes();return d.getFullYear()+'/'+(M<10?'0':'')+M+'/'+(D<10?'0':'')+D+' '+(H<10?'0':'')+H+':'+(Mi<10?'0':'')+Mi;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Navigation ──
function switchTab(tab){S.tab=tab;S.page='list';S.pd={};document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});document.getElementById('tab-'+tab).classList.add('on');render();}
function nav(page,pd){S.page=page;S.pd=pd||{};render();document.getElementById('main').scrollTop=0;}
function goBack(){if(S.page==='match')nav('detail',{tId:S.pd.tId});else nav('list');}
function hdrAction(){
  if(S.page==='match')undoScore(S.pd.tId,S.pd.mId);
  else if(S.page==='list'&&S.tab==='players')toggleSelMode();
}
function toggleSelMode(){SP.mode=!SP.mode;SP.ids={};render();}
function toggleSelP(id){
  if(SP.ids[id])delete SP.ids[id];else SP.ids[id]=true;
  var n=Object.keys(SP.ids).length;
  var fab=document.getElementById('fab');
  if(fab&&SP.mode)fab.textContent=n?'🗑 '+n:'🗑';
  var q=document.getElementById('p-search');
  var el=document.getElementById('pl');
  if(el)el.innerHTML=renderPItems(q&&q.value?S.players.filter(function(p){return p.name.indexOf(q.value)>=0;}):S.players);
}
function deleteSelP(){
  var ids=Object.keys(SP.ids);
  if(!ids.length)return;
  if(!confirm('確定刪除 '+ids.length+' 位選手？'))return;
  S.players=S.players.filter(function(p){return!SP.ids[p.id];});
  SP.mode=false;SP.ids={};
  save();render();
}

// ── Players ──
function addPlayer(name,bday){S.players.push({id:uid(),name:name.trim(),birthday:bday,createdAt:new Date().toISOString()});save();render();}
function editPlayer(id,name,bday){var p=S.players.find(function(p){return p.id===id;});if(p){p.name=name.trim();p.birthday=bday;save();render();}}
function delPlayer(id){if(!confirm('確定刪除此選手？'))return;S.players=S.players.filter(function(p){return p.id!==id;});save();closeModal();render();}

// ── Score helpers ──
function pScore(m,name){return m.scores.filter(function(s){return s.p===name;}).reduce(function(n,s){return n+s.pts;},0);}

// ── 循環賽積分榜 ──
function calcStandings(t){
  var map={};
  t.participants.forEach(function(n){map[n]={name:n,wins:0,losses:0,pts:0,played:0};});
  t.matches.forEach(function(m){
    if(m.status==='completed'&&m.winner){
      map[m.p1].played++;if(m.p2)map[m.p2].played++;
      map[m.winner].wins++;
      var loser=m.winner===m.p1?m.p2:m.p1;
      if(loser&&map[loser])map[loser].losses++;
    }
    if(map[m.p1])map[m.p1].pts+=pScore(m,m.p1);
    if(m.p2&&map[m.p2])map[m.p2].pts+=pScore(m,m.p2);
  });
  return Object.values(map).sort(function(a,b){return b.wins!==a.wins?b.wins-a.wins:b.pts-a.pts;});
}

// ── Create Tournament ──
function createTournament(name,names,target,type){
  type=type||'elimination';
  var arr=shuffle(names.slice());
  var t={id:uid(),name:name,createdAt:new Date().toISOString(),status:'ongoing',
         participants:names.slice(),target:target,type:type,matches:[],seed:null,winner:null};
  var n=0;
  if(type==='roundrobin'){
    for(var i=0;i<arr.length;i++){
      for(var j=i+1;j<arr.length;j++){
        n++;
        t.matches.push({id:uid(),p1:arr[i],p2:arr[j],round:1,num:n,status:'pending',winner:null,scores:[]});
      }
    }
  } else {
    if(arr.length%2!==0){var s=arr.shift();t.seed=s;t.matches.push({id:uid(),p1:s,p2:null,round:1,num:0,status:'bye',winner:s,scores:[]});}
    while(arr.length>=2){n++;var p1=arr.shift(),p2=arr.shift();t.matches.push({id:uid(),p1:p1,p2:p2,round:1,num:n,status:'pending',winner:null,scores:[]});}
  }
  S.tournaments.push(t);save();return t.id;
}

// ── Match scoring ──
function addScore(tId,mId,pName,reasonId,pts,note){
  note=note||'';
  var t=S.tournaments.find(function(t){return t.id===tId;});
  var m=t&&t.matches.find(function(m){return m.id===mId;});
  if(!m||m.status==='completed')return;
  m.scores.push({id:uid(),p:pName,reason:reasonId,pts:pts,note:note,time:new Date().toISOString()});
  if(m.status==='pending')m.status='ongoing';
  var s1=pScore(m,m.p1),s2=m.p2?pScore(m,m.p2):0;
  if(s1>=t.target){m.winner=m.p1;m.status='completed';}
  else if(m.p2&&s2>=t.target){m.winner=m.p2;m.status='completed';}
  // 循環賽：全部比完自動決定冠軍
  if(t.type==='roundrobin'&&m.status==='completed'){
    var allDone=t.matches.every(function(x){return x.status==='completed';});
    if(allDone){var st=calcStandings(t);t.winner=st[0].name;t.status='completed';}
  }
  save();renderMatchContent();
}
function undoScore(tId,mId){
  var t=S.tournaments.find(function(t){return t.id===tId;});
  var m=t&&t.matches.find(function(m){return m.id===mId;});
  if(!m||!m.scores.length)return;
  m.scores.sort(function(a,b){return new Date(a.time)-new Date(b.time);});
  m.scores.pop();m.winner=null;
  if(m.status==='completed'){m.status=m.scores.length?'ongoing':'pending';}
  if(t.status==='completed'){t.status='ongoing';t.winner=null;}
  save();renderMatchContent();
}
function reopenMatch(tId,mId){
  var t=S.tournaments.find(function(t){return t.id===tId;});
  var m=t&&t.matches.find(function(m){return m.id===mId;});
  if(!m)return;
  var prevWinner=m.winner;
  m.status=m.scores.length?'ongoing':'pending';
  m.winner=null;
  if(t.status==='completed'){t.status='ongoing';t.winner=null;}
  // 淘汰賽：如果後續輪次已有以此場勝者建立的比賽，也一併清除
  if(t.type==='elimination'&&prevWinner){
    t.matches.forEach(function(nm){
      if(nm.round>m.round&&(nm.p1===prevWinner||nm.p2===prevWinner)){
        if(nm.p1===prevWinner)nm.p1=null;
        if(nm.p2===prevWinner)nm.p2=null;
        if(nm.status!=='pending'){nm.status='pending';nm.winner=null;nm.scores=[];}
      }
    });
  }
  var right=document.getElementById('hdr-right');
  if(right)right.style.visibility='visible';
  save();renderMatchContent();
}

// ── Elimination helpers ──
function curRound(t){var active=t.matches.filter(function(m){return m.status==='pending'||m.status==='ongoing';});if(!active.length)return Math.max.apply(null,[0].concat(t.matches.map(function(m){return m.round;})));return Math.min.apply(null,active.map(function(m){return m.round;}));}
function roundDone(t){var r=curRound(t);return t.matches.filter(function(m){return m.round===r;}).every(function(m){return m.status==='completed'||m.status==='bye';});}
function byRound(t){var max=Math.max.apply(null,[0].concat(t.matches.map(function(m){return m.round;})));var res={};for(var r=1;r<=max;r++){res[r]=t.matches.filter(function(m){return m.round===r;}).sort(function(a,b){return a.num-b.num;});}return res;}
function rTitle(r,total){var rem=total-r+1;if(rem===1)return'🏆 決賽';if(rem===2)return'準決賽';if(rem===3)return'8強賽';if(rem===4)return'16強賽';return'第 '+r+' 輪';}
function advanceRound(tId){
  var t=S.tournaments.find(function(t){return t.id===tId;});if(!t)return;
  var cr=curRound(t);
  var winners=t.matches.filter(function(m){return m.round===cr;}).map(function(m){return m.winner;}).filter(Boolean);
  if(t.pendingEntrants&&t.pendingEntrants.length){winners=winners.concat(t.pendingEntrants);t.pendingEntrants=[];}
  if(winners.length===1){t.winner=winners[0];t.status='completed';save();render();return;}
  var nr=cr+1,adv=shuffle(winners.slice()),n=0;
  var isOdd=(nr%2===1);
  var byeSeed=null;
  if(adv.length%2!==0){byeSeed=isOdd?adv.shift():adv.pop();}
  if(isOdd&&byeSeed)t.matches.push({id:uid(),p1:byeSeed,p2:null,round:nr,num:0,status:'bye',winner:byeSeed,scores:[]});
  while(adv.length>=2){n++;var p1=adv.shift(),p2=adv.shift();t.matches.push({id:uid(),p1:p1,p2:p2,round:nr,num:n,status:'pending',winner:null,scores:[]});}
  if(!isOdd&&byeSeed)t.matches.push({id:uid(),p1:byeSeed,p2:null,round:nr,num:n+1,status:'bye',winner:byeSeed,scores:[]});
  save();render();
}
function delTournament(tId){if(!confirm('確定刪除此比賽？'))return;S.tournaments=S.tournaments.filter(function(t){return t.id!==tId;});save();nav('list');}

// ── Render ──
function render(){
  updateHdr();hideFab();
  var main=document.getElementById('main');
  if(S.tab==='players'){renderPlayers(main);return;}
  if(S.page==='list')renderTList(main);
  else if(S.page==='detail')renderTDetail(main);
  else if(S.page==='match'){main.innerHTML='<div id="mc"></div>';renderMatchContent();}
}

// ── Join player mid-tournament ──
function selJoinP(el){
  var inp=document.getElementById('join-n');
  if(inp)inp.value=el.dataset.n;
  document.querySelectorAll('.join-sel').forEach(function(x){x.classList.remove('join-sel');});
  el.classList.add('join-sel');
}
function openJoin(tId){
  var t=S.tournaments.find(function(t){return t.id===tId;});
  if(!t||t.status==='completed')return;
  var avail=S.players.filter(function(p){return t.participants.indexOf(p.name)<0;});
  var info='';
  if(t.type==='elimination'){
    var cr=curRound(t);
    var byeM=t.matches.filter(function(m){return m.round===cr;}).find(function(m){return m.status==='bye';});
    info=byeM?'本輪有種子選手 <strong>'+esc(byeM.p1)+'</strong>，加入者將立即與其對決。':'本輪無種子選手，加入者將在下一輪作為種子選手（或與種子選手PK）。';
  }else{
    info='選手加入後將與所有現有選手新增對戰。';
  }
  var items='';
  avail.forEach(function(p){
    items+='<div class="card" style="padding:0;cursor:pointer" data-n="'+esc(p.name)+'" onclick="selJoinP(this)">'+
      '<div class="crow"><div class="av">'+esc(p.name[0])+'</div><div style="flex:1"><div class="t-h">'+esc(p.name)+'</div></div>'+
      '<div style="font-size:12px;color:var(--text3)">點選填入</div></div></div>';
  });
  var sh='<div class="sh-handle"></div>'+
    '<div class="sh-hdr"><button class="sh-cancel" onclick="closeModal()">取消</button><span class="sh-title">加入選手</span><div style="width:56px"></div></div>'+
    '<div style="padding:4px 18px 10px;font-size:13px;color:var(--text2);line-height:1.5">'+info+'</div>'+
    '<div class="f-sec"><div class="f-lbl">選手姓名</div><input class="f-inp" id="join-n" placeholder="輸入姓名或從下方選取" autocomplete="off"></div>'+
    (avail.length?'<div style="padding:4px 18px 6px"><div class="f-lbl">從名單選取</div></div><div class="cl" style="padding:0 6px">'+items+'</div>':'')+
    '<div style="padding:14px 18px 8px"><button class="btn-p" data-tid="'+esc(tId)+'" onclick="joinPlayer(this.dataset.tid)">確認加入</button></div>';
  document.getElementById('sheet').innerHTML=sh;
  showModal();
}
function joinPlayer(tId){
  var inp=document.getElementById('join-n');
  var name=(inp?inp.value:'').trim();
  if(!name){alert('請輸入選手姓名');return;}
  var t=S.tournaments.find(function(t){return t.id===tId;});
  if(!t)return;
  if(t.participants.indexOf(name)>=0){alert('此選手已在比賽名單中');return;}
  if(t.type==='roundrobin')addPlayerRR(t,name);
  else addPlayerElim(t,name);
  closeModal();save();render();
}
function addPlayerRR(t,name){
  var existing=t.participants.slice();
  t.participants.push(name);
  var n=t.matches.length;
  existing.forEach(function(p){n++;t.matches.push({id:uid(),p1:name,p2:p,round:1,num:n,status:'pending',winner:null,scores:[]});});
}
function addPlayerElim(t,name){
  var cr=curRound(t);
  var byeM=t.matches.filter(function(m){return m.round===cr;}).find(function(m){return m.status==='bye';});
  t.participants.push(name);
  if(byeM){byeM.p2=name;byeM.status='pending';byeM.winner=null;}
  else{if(!t.pendingEntrants)t.pendingEntrants=[];t.pendingEntrants.push(name);showSync('ok','⏳ '+name+' 將在下一輪加入');}
}

// ── Players list ──
function renderPlayers(main){
  if(SP.mode){
    var n=Object.keys(SP.ids).length;
    setFab(deleteSelP);
    var fab=document.getElementById('fab');
    if(fab){fab.textContent=n?'🗑 '+n:'🗑';fab.style.background='#ef4444';}
  } else {
    setFab(openPForm);
    var fab=document.getElementById('fab');
    if(fab){fab.textContent='+';fab.style.background='';}
  }
  if(!S.players.length){main.innerHTML='<div class="empty"><div class="em-ic">👥</div><div class="em-t">尚未新增選手</div><div class="em-s">點右下角 + 開始新增</div></div>';return;}
  main.innerHTML='<input id="p-search" class="search" placeholder="🔍 搜尋選手" oninput="filterP(this.value)"><div class="cl" id="pl">'+renderPItems(S.players)+'</div>';
}
function filterP(q){var el=document.getElementById('pl');if(!el)return;el.innerHTML=renderPItems(q?S.players.filter(function(p){return p.name.indexOf(q)>=0;}):S.players);}
function renderPItems(ps){
  if(!ps.length)return'<div style="text-align:center;padding:20px;color:var(--text3)">找不到選手</div>';
  return ps.map(function(p){
    if(SP.mode){
      var sel=!!SP.ids[p.id];
      return'<div class="card" style="'+(sel?'background:#dcfce7;outline:2px solid #16a34a;':'')+'" data-pid="'+esc(p.id)+'" onclick="toggleSelP(this.dataset.pid)">'+
        '<div class="crow">'+
        '<div style="width:22px;height:22px;border-radius:50%;border:2px solid '+(sel?'#16a34a':'#c7c7cc')+';background:'+(sel?'#16a34a':'transparent')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:4px">'+
        (sel?'<span style="color:#fff;font-size:13px;font-weight:900;line-height:1">✓</span>':'')+
        '</div>'+
        '<div class="av">'+esc(p.name[0])+'</div>'+
        '<div style="flex:1"><div class="t-h">'+esc(p.name)+'</div><div class="t-s">'+fmtD(p.birthday)+'</div></div>'+
        '<div class="t-s">'+calcAge(p.birthday)+' 歲</div>'+
        '</div></div>';
    }
    return'<div class="card"><div class="crow" data-pid="'+esc(p.id)+'" onclick="openPForm(this.dataset.pid)"><div class="av">'+esc(p.name[0])+'</div><div style="flex:1"><div class="t-h">'+esc(p.name)+'</div><div class="t-s">'+fmtD(p.birthday)+'</div></div><div class="t-s">'+calcAge(p.birthday)+' 歲</div><div class="chevron">&rsaquo;</div></div></div>';
  }).join('');
}

// ── Tournament list ──

// ── Tournament detail ──
function renderTDetail(main){
  var t=S.tournaments.find(function(t){return t.id===S.pd.tId;});
  if(!t){nav('list');return;}
  if(t.type==='roundrobin') renderRRDetail(main,t);
  else renderElimDetail(main,t);
}

// ── 循環賽對戰矩陣 ──
function renderRRTable(t){
  var ps=t.participants;
  var html='<div class="rr-wrap"><table class="rr-table"><thead><tr><th></th>';
  ps.forEach(function(p){html+='<th title="'+esc(p)+'">'+esc(p.length>5?p.slice(0,5)+'…':p)+'</th>';});
  html+='</tr></thead><tbody>';
  ps.forEach(function(rp){
    html+='<tr><th title="'+esc(rp)+'">'+esc(rp.length>5?rp.slice(0,5)+'…':rp)+'</th>';
    ps.forEach(function(cp){
      if(rp===cp){html+='<td class="rr-self">✕</td>';return;}
      var m=t.matches.find(function(m){return(m.p1===rp&&m.p2===cp)||(m.p1===cp&&m.p2===rp);});
      if(!m){html+='<td class="rr-wait">—</td>';return;}
      var rs=pScore(m,rp),cs=pScore(m,cp);
      if(m.status==='pending')html+='<td class="rr-wait">—</td>';
      else if(m.status==='completed')html+='<td class="'+(m.winner===rp?'rr-win':'rr-lose')+'">'+rs+'-'+cs+'</td>';
      else html+='<td class="rr-going">'+rs+'-'+cs+'</td>';
    });
    html+='</tr>';
  });
  html+='</tbody></table></div>';
  return html;
}

// ── 循環賽 Detail ──
function renderRRDetail(main,t){
  var standings=calcStandings(t);
  var allDone=t.matches.every(function(m){return m.status==='completed';});
  var html='<div>';
  // 冠軍 banner
  if(t.winner){
    html+='<div class="w-banner"><div style="font-size:40px">👑</div><div style="font-size:13px;color:var(--yellow);font-weight:700;margin-top:2px">🏆 冠軍</div><div style="font-size:28px;font-weight:900;margin-top:4px">'+esc(t.winner)+'</div></div>';
  }
  // 積分榜
  html+='<div class="rnd-hdr"><span class="rnd-title">📊 積分榜</span></div>';
  html+='<div class="st-card">'+
    '<div class="st-head"><div class="st-head-rank">#</div><div class="st-head-name">選手</div><div class="st-head-w">勝場</div><div class="st-head-p">得分</div></div>';
  standings.forEach(function(s,i){
    var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':''+(i+1);
    html+='<div class="st-row"><div class="st-rank'+(i<3?' top':'')+'">'+medal+'</div><div class="st-name">'+esc(s.name)+'</div><div class="st-wins">'+s.wins+'</div><div class="st-pts">'+s.pts+' 分</div></div>';
  });
  html+='</div>';
  // 對戰矩陣
  html+='<div class="rnd-hdr"><span class="rnd-title">📋 對戰矩陣</span></div>';
  html+=renderRRTable(t);
  // 對戰列表
  var doneCount=t.matches.filter(function(m){return m.status==='completed';}).length;
  html+='<div class="rnd-hdr"><span class="rnd-title">全部對戰</span><span class="rnd-badge" style="background:'+(allDone?'#dcfce7':'#fff7ed')+';color:'+(allDone?'#15803d':'#c2410c')+'">'+doneCount+'/'+t.matches.length+' 完成</span></div>';
  t.matches.slice().sort(function(a,b){return a.num-b.num;}).forEach(function(m,i){
    var s1=pScore(m,m.p1),s2=pScore(m,m.p2||'');
    var cls=m.status==='ongoing'?'ongoing':m.status==='completed'?'completed':'';
    html+='<div class="mc '+cls+'" data-tid="'+esc(t.id)+'" data-mid="'+esc(m.id)+'" onclick="nav(\'match\',{tId:this.dataset.tid,mId:this.dataset.mid})">'+
      mcCell(m.p1,s1,m.winner===m.p1,t.target)+
      '<div class="mc-div"><span class="mc-no">第'+(i+1)+'場</span>'+(m.status==='completed'?'<span style="font-size:18px">✅</span>':m.status==='ongoing'?'<span style="font-size:18px">▶️</span>':'<span class="vs">VS</span>')+'</div>'+
      mcCell(m.p2||'',s2,m.winner===m.p2,t.target)+
      '</div>';
  });
  if(t.status==='ongoing')html+='<div style="text-align:center;padding:8px 16px 0"><button class="btn-ghost" style="color:var(--blue)" data-tid="'+esc(t.id)+'" onclick="openJoin(this.dataset.tid)">＋ 加入選手</button></div>';
  html+='<div style="text-align:center;padding:8px 16px 32px"><button class="btn-ghost" data-tid="'+esc(t.id)+'" onclick="delTournament(this.dataset.tid)">🗑 刪除此比賽</button></div></div>';
  main.innerHTML=html;
}

// ── 淘汰賽 Bracket SVG ──
function renderBracketSVG(t){
  var RH=42,BW=114,BH=28,CW=158,PAD=6;
  var rounds=byRound(t);
  var rNums=Object.keys(rounds).map(Number).sort(function(a,b){return a-b;});
  var TR=rNums.length;
  // Calculate height from actual max slot used across all rounds (handles mid-tournament joins)
  var maxSlots=1;
  rNums.forEach(function(r){
    var spp=Math.pow(2,r-1);
    maxSlots=Math.max(maxSlots,rounds[r].length*2*spp);
  });
  var svgH=maxSlots*RH+PAD*2;
  var svgW=TR*CW+BW+PAD*2;
  var parts=[];

  function slotY(slot){return PAD+slot*RH+(RH-BH)/2;}
  function svgBox(x,y,name,score,isWin,status){
    var bg=isWin?'#dcfce7':'#fff';
    var bd=isWin?'#16a34a':status==='ongoing'?'#ea580c':'#d1d1d6';
    var sw=isWin||status==='ongoing'?2:1;
    var tc=isWin?'#15803d':'#1c1c1e';
    var fw=isWin?'700':'500';
    var disp=name==null?'待定':(name.length>9?name.slice(0,8)+'…':name);
    var sc=(score!==null&&score!==undefined)?score:'';
    return '<rect x="'+x+'" y="'+y+'" width="'+BW+'" height="'+BH+'" rx="5" fill="'+bg+'" stroke="'+bd+'" stroke-width="'+sw+'"/>'+
      '<text x="'+(x+7)+'" y="'+(y+BH/2+4.5)+'" font-size="11.5" font-family="-apple-system,sans-serif" fill="'+tc+'" font-weight="'+fw+'">'+esc(disp)+(sc!==''?' · '+sc:'')+'</text>';
  }
  function line(x1,y1,x2,y2,dash){
    return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="#c7c7cc" stroke-width="1.5"'+(dash?' stroke-dasharray="5,3"':'')+'/>';
  }

  rNums.forEach(function(r){
    var rIdx=r-1;
    var cx=PAD+rIdx*CW;
    var mx=cx+BW+(CW-BW)/2;
    var spp=Math.pow(2,rIdx);
    var ms=rounds[r].slice().sort(function(a,b){return a.num-b.num;});
    ms.forEach(function(m,mi){
      var isBye=m.status==='bye';
      var p1Slot=mi*2*spp+(spp-1)/2;
      var p2Slot=p1Slot+spp;
      var p1y=slotY(p1Slot),p2y=slotY(p2Slot);
      var p1my=p1y+BH/2,p2my=p2y+BH/2;
      var cmid=(p1my+p2my)/2;
      parts.push(svgBox(cx,p1y,m.p1,pScore(m,m.p1),m.winner===m.p1,m.status));
      if(isBye){
        parts.push(line(cx+BW,p1my,cx+CW,p1my,true));
      } else if(m.p2){
        parts.push(svgBox(cx,p2y,m.p2,pScore(m,m.p2),m.winner===m.p2,m.status));
        parts.push(line(cx+BW,p1my,mx,p1my,false));
        parts.push(line(cx+BW,p2my,mx,p2my,false));
        parts.push(line(mx,p1my,mx,p2my,false));
        parts.push(line(mx,cmid,cx+CW,cmid,false));
      }
    });
  });

  // 冠軍框
  if(t.winner){
    var cx=PAD+TR*CW;
    var finalMs=rounds[rNums[TR-1]];
    var fSpp=Math.pow(2,TR-1);
    var fp1Slot=(fSpp-1)/2;
    var fp2Slot=fp1Slot+fSpp;
    var champY=(slotY(fp1Slot)+BH/2+slotY(fp2Slot)+BH/2)/2-BH/2;
    parts.push('<rect x="'+cx+'" y="'+champY+'" width="'+BW+'" height="'+BH+'" rx="5" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>');
    var disp=t.winner.length>8?t.winner.slice(0,7)+'…':t.winner;
    parts.push('<text x="'+(cx+7)+'" y="'+(champY+BH/2+4.5)+'" font-size="11.5" font-family="-apple-system,sans-serif" fill="#92400e" font-weight="800">🏆 '+esc(disp)+'</text>');
  }

  return '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 16px 12px;padding:4px 0;"><svg width="'+svgW+'" height="'+svgH+'" xmlns="http://www.w3.org/2000/svg">'+parts.join('')+'</svg></div>';
}

// ── 淘汰賽 Detail ──
function renderElimDetail(main,t){
  var rounds=byRound(t),rNums=Object.keys(rounds).map(Number).sort(function(a,b){return a-b;}),total=rNums.length;
  var html='<div>';
  if(t.winner)html+='<div class="w-banner"><div style="font-size:40px">👑</div><div style="font-size:13px;color:var(--yellow);font-weight:700;margin-top:2px">🏆 冠軍</div><div style="font-size:28px;font-weight:900;margin-top:4px">'+esc(t.winner)+'</div></div>';
  // 賽程表 SVG
  html+='<div class="rnd-hdr"><span class="rnd-title">🗂 賽程表</span></div>';
  html+=renderBracketSVG(t);
  var _gn=0;
  rNums.forEach(function(r){
    var ms=rounds[r],done=ms.every(function(m){return m.status==='completed'||m.status==='bye';});
    html+='<div class="rnd-hdr"><span class="rnd-title">'+rTitle(r,total)+'</span><span class="rnd-badge" style="background:'+(done?'#dcfce7':'#fff7ed')+';color:'+(done?'#15803d':'#c2410c')+'">'+(done?'✓ 完成':'進行中')+'</span></div>';
    ms.forEach(function(m){
      var s1=pScore(m,m.p1),s2=m.p2?pScore(m,m.p2):0;
      var cls=m.status==='ongoing'?'ongoing':m.status==='completed'?'completed':m.status==='bye'?'bye':'';
      var ca=m.status!=='bye'?'data-tid="'+esc(t.id)+'" data-mid="'+esc(m.id)+'" onclick="nav(\'match\',{tId:this.dataset.tid,mId:this.dataset.mid})"':'';
      if(m.status!=='bye')_gn++;
      var noLabel=m.status!=='bye'?'<span class="mc-no">第'+_gn+'場</span>':'';
      html+='<div class="mc '+cls+'" '+ca+'>'+mcCell(m.p1,s1,m.winner===m.p1,t.target)+'<div class="mc-div">'+noLabel+(m.status==='bye'?'<span style="font-size:10px;color:var(--text3)">輪空</span>':m.status==='completed'?'<span style="font-size:18px">✅</span>':m.status==='ongoing'?'<span style="font-size:18px">▶️</span>':'<span class="vs">VS</span>')+'</div>'+(m.p2?mcCell(m.p2,s2,m.winner===m.p2,t.target):'<div class="mc-p" style="opacity:.3">—</div>')+'</div>';
    });
  });
  if(t.pendingEntrants&&t.pendingEntrants.length){
    html+='<div style="margin:8px 16px;padding:10px 14px;background:#fff7ed;border-radius:10px;border:1.5px solid #fed7aa;font-size:13px;color:#92400e">'+
      '⏳ <strong>待加入（下一輪）：</strong>'+t.pendingEntrants.map(function(n){return esc(n);}).join('、')+'</div>';
  }
  if(t.status==='ongoing'&&roundDone(t))html+='<button class="adv-btn" data-tid="'+esc(t.id)+'" onclick="advanceRound(this.dataset.tid)">進入下一輪 →</button>';
  if(t.status==='ongoing')html+='<div style="text-align:center;padding:8px 16px 0"><button class="btn-ghost" style="color:var(--blue)" data-tid="'+esc(t.id)+'" onclick="openJoin(this.dataset.tid)">＋ 加入選手</button></div>';
  html+='<div style="text-align:center;padding:8px 16px 32px"><button class="btn-ghost" data-tid="'+esc(t.id)+'" onclick="delTournament(this.dataset.tid)">🗑 刪除此比賽</button></div></div>';
  main.innerHTML=html;
}

function mcCell(name,score,isWin,target){
  var dots='';for(var i=0;i<target;i++)dots+='<div class="mc-dot'+(i<score?' on':'')+'"></div>';
  return'<div class="mc-p"><div class="mc-name">'+esc(name==null?'待定':name)+'</div><div class="mc-score'+(isWin?' win':'')+'">'+score+'</div><div class="mc-dots">'+dots+'</div></div>';
}

// ── Match content ──
function renderMatchContent(){
  var tId=S.pd.tId,mId=S.pd.mId;
  var t=S.tournaments.find(function(t){return t.id===tId;});
  var m=t&&t.matches.find(function(m){return m.id===mId;});
  var el=document.getElementById('mc');if(!m||!el)return;
  var s1=pScore(m,m.p1),s2=m.p2?pScore(m,m.p2):0;
  var right=document.getElementById('hdr-right');
  if(right)right.style.visibility=(m.scores.length&&m.status!=='completed')?'visible':'hidden';
  if(m.status==='completed'){
    el.innerHTML='<div class="result"><div style="font-size:72px">🏆</div><div style="font-size:14px;color:var(--text2)">比賽結束</div><div class="r-win">'+esc(m.winner)+' 獲勝！</div><div class="r-scores"><div class="rsp"><div class="rsp-n">'+esc(m.p1)+'</div><div class="rsp-s'+(m.winner===m.p1?' win':'')+'">'+s1+'</div></div><div style="font-size:24px;color:var(--text3)">:</div><div class="rsp"><div class="rsp-n">'+esc(m.p2||'')+'</div><div class="rsp-s'+(m.winner===m.p2?' win':'')+'">'+s2+'</div></div></div><button class="btn-p" data-tid="'+esc(tId)+'" onclick="nav(\'detail\',{tId:this.dataset.tid})">確認，返回賽程</button><button class="btn-p" style="margin-top:8px;background:var(--text3)" data-tid="'+esc(tId)+'" data-mid="'+esc(mId)+'" onclick="reopenMatch(this.dataset.tid,this.dataset.mid)">✏️ 修正比賽</button></div>';
    return;
  }
  var sortedH=m.scores.slice().sort(function(a,b){return new Date(b.time)-new Date(a.time);});
  var hist=sortedH.length?'<div class="hist-sec"><div class="hist-t">得分記錄</div>'+sortedH.map(function(s){var r=REASONS.find(function(r){return r.id===s.reason;})||{emoji:'⭐',desc:s.reason};return'<div class="hi"><span class="hi-em">'+r.emoji+'</span><div class="hi-inf"><div class="hi-pl">'+esc(s.p)+'</div><div class="hi-re">'+esc(s.note||r.desc)+'</div></div><span class="hi-pt">+'+s.pts+'</span></div>';}).join('')+'</div>':'';
  var btnCol=function(pName){return REASONS.map(function(r){return'<button class="sbtn '+r.cls+'" data-p="'+esc(pName)+'" data-r="'+r.id+'" onclick="hsBtnClick(this)"><span class="sb-em">'+r.emoji+'</span><span class="sb-nm">'+r.name+'</span><span class="sb-pt">+'+r.pts+'</span></button>';}).join('');};
  el.innerHTML='<div class="ssh"><div class="ssh-p"><div class="ssh-name">'+esc(m.p1)+'</div><div class="ssh-score'+(m.winner===m.p1?' win':'')+'">'+s1+'</div></div><div class="ssh-mid"><div class="ssh-tl">目標</div><div class="ssh-tv">'+t.target+'</div></div>'+(m.p2?'<div class="ssh-p"><div class="ssh-name">'+esc(m.p2)+'</div><div class="ssh-score'+(m.winner===m.p2?' win':'')+'">'+s2+'</div></div>':'<div style="flex:1"></div>')+'</div><div class="scols"><div class="scol"><div class="scol-name">'+esc(m.p1)+'</div>'+btnCol(m.p1)+'</div>'+(m.p2?'<div class="scol"><div class="scol-name">'+esc(m.p2)+'</div>'+btnCol(m.p2)+'</div>':'')+'</div>'+hist;
}
function handleScore(tId,mId,pName,rId,defPts){if(rId==='custom')openCS(tId,mId,pName);else addScore(tId,mId,pName,rId,defPts,'');}
function hsBtnClick(el){var r=REASONS.find(function(r){return r.id===el.dataset.r;});if(r)handleScore(S.pd.tId,S.pd.mId,el.dataset.p,r.id,r.pts);}


// ── Player form ──
function openPForm(pid){
  pid=pid||null;if(pid==='')pid=null;
  var p=pid?S.players.find(function(p){return p.id===pid;}):null;
  var defBday=(new Date().getFullYear()-12)+'-01-01';
  var delBtn=p?'<div style="text-align:center;padding:4px 16px 16px"><button class="btn-ghost" data-pid="'+esc(p.id)+'" onclick="delPlayer(this.dataset.pid)">🗑 刪除此選手</button></div>':'<div style="height:20px"></div>';
  document.getElementById('sheet').innerHTML='<div class="sh-handle"></div><div class="sh-hdr"><button class="sh-cancel" onclick="closeModal()">取消</button><span class="sh-title">'+(p?'編輯選手':'新增選手')+'</span><button class="sh-ok" data-pid="'+(pid?esc(pid):'')+'" onclick="savePForm(this.dataset.pid)">儲存</button></div><div class="f-sec"><div class="f-lbl">姓名</div><input class="f-inp" id="pf-n" placeholder="選手姓名" value="'+(p?esc(p.name):'')+'" autocomplete="off"></div><div class="f-sec"><div class="f-lbl">生日</div><input class="f-inp" id="pf-b" type="date" value="'+(p?p.birthday:defBday)+'"></div>'+delBtn;
  showModal();
  setTimeout(function(){var n=document.getElementById('pf-n');if(n)n.focus();},300);
}
function savePForm(pid){
  pid=pid||null;if(pid==='')pid=null;
  var name=document.getElementById('pf-n').value.trim();
  var bday=document.getElementById('pf-b').value;
  if(!name){alert('請輸入選手姓名');return;}
  if(!bday){alert('請選擇生日');return;}
  if(pid)editPlayer(pid,name,bday);else addPlayer(name,bday);closeModal();
}

// ── Create tournament sheet ──
function openCT(){CF={name:'',target:4,sel:new Set(),type:'elimination'};renderCTSheet();showModal();}
function renderCTSheet(){
  var ps=S.players,can=CF.sel.size>=2&&CF.name.trim().length>0;
  var selHtml=!ps.length?'<div style="padding:16px;text-align:center;color:var(--text3)">請先新增選手</div>':
    '<div class="card">'+ps.map(function(p){return'<div class="psr" data-n="'+esc(p.name)+'" onclick="togSel(this.dataset.n)"><div class="psr-chk'+(CF.sel.has(p.name)?' on':'')+'"></div><div style="flex:1"><div class="t-h">'+esc(p.name)+'</div><div class="t-s">'+fmtD(p.birthday)+'</div></div></div>';}).join('')+'</div>';
  var matchCount=CF.type==='roundrobin'&&CF.sel.size>=2?CF.sel.size*(CF.sel.size-1)/2:0;
  document.getElementById('sheet').innerHTML=
    '<div class="sh-handle"></div>'+
    '<div class="sh-hdr"><button class="sh-cancel" onclick="closeModal()">取消</button><span class="sh-title">建立比賽</span><button class="sh-ok" id="ct-ok" onclick="submitCT()" '+(can?'':'disabled')+'>建立</button></div>'+
    '<div class="f-sec"><div class="f-lbl">比賽名稱</div><input class="f-inp" id="ct-n" placeholder="例如：2025春季聯賽" value="'+esc(CF.name)+'" oninput="CF.name=this.value;updateCTOk()" autocomplete="off"></div>'+
    '<div class="f-sec"><div class="f-lbl">賽制</div><div class="type-sel">'+
      '<button class="type-btn'+(CF.type==='elimination'?' on':'')+'" onclick="setType(\'elimination\')">🏆 淘汰賽</button>'+
      '<button class="type-btn'+(CF.type==='roundrobin'?' on':'')+'" onclick="setType(\'roundrobin\')">🔄 循環賽</button>'+
    '</div></div>'+
    '<div class="f-sec"><div class="f-lbl">先攻得幾分獲勝</div><div class="stepper"><button class="stp-btn" onclick="chgTarget(-1)" '+(CF.target<=1?'disabled':'')+'>−</button><div class="stp-val">'+CF.target+' 分</div><button class="stp-btn" onclick="chgTarget(1)" '+(CF.target>=10?'disabled':'')+'>＋</button></div></div>'+
    '<div class="f-sec"><div class="f-lbl">參賽選手 '+(CF.sel.size>0?'<span style="color:var(--red);font-weight:700">(已選'+CF.sel.size+'人)</span>':'')+'</div>'+selHtml+'</div>'+
    (CF.type==='roundrobin'&&CF.sel.size>=2?'<div class="infobox">🔄 <span>循環賽：每位選手都會互相對戰，共 '+matchCount+' 場，最終積分最多者獲勝</span></div>':'')+
    (CF.type==='elimination'&&CF.sel.size>=2&&CF.sel.size%2!==0?'<div class="infobox">ℹ️ <span>人數為奇數（'+CF.sel.size+'人），一位種子選手第一輪輪空</span></div>':'')+
    '<div style="height:20px"></div>';
}
function setType(type){CF.type=type;renderCTSheet();}
function updateCTOk(){var ok=document.getElementById('ct-ok');if(ok)ok.disabled=!(CF.sel.size>=2&&CF.name.trim().length>0);}
function chgTarget(d){CF.target=Math.min(10,Math.max(1,CF.target+d));renderCTSheet();}
function togSel(name){if(CF.sel.has(name))CF.sel.delete(name);else CF.sel.add(name);renderCTSheet();}
function submitCT(){
  if(CF.sel.size<2){alert('請選擇至少 2 位選手');return;}
  var tId=createTournament(CF.name.trim()||'新比賽',Array.from(CF.sel),CF.target,CF.type);
  closeModal();nav('detail',{tId:tId});
}

// ── Custom score ──
function openCS(tId,mId,pName){
  CS={tId:tId,mId:mId,pName:pName,pts:1,note:''};
  document.getElementById('sheet').innerHTML='<div class="sh-handle"></div><div class="sh-hdr"><button class="sh-cancel" onclick="closeModal()">取消</button><span class="sh-title">自訂得分</span><button class="sh-ok" onclick="submitCS()">確認</button></div><div style="padding:0 18px 12px;font-size:14px;color:var(--text2)">為 <strong>'+esc(pName)+'</strong> 新增自訂得分</div><div class="f-sec"><div class="f-lbl">說明</div><input class="f-inp" id="cs-n" placeholder="例如：裁判加分" oninput="CS.note=this.value" autocomplete="off"></div><div class="f-sec"><div class="f-lbl">分數</div><div class="stepper"><button class="stp-btn" id="cs-m" onclick="chgCS(-1)" disabled>−</button><div class="stp-val" id="cs-v">+ 1 分</div><button class="stp-btn" id="cs-p" onclick="chgCS(1)">＋</button></div></div><div style="height:20px"></div>';
  showModal();
}
function chgCS(d){CS.pts=Math.min(10,Math.max(1,CS.pts+d));var v=document.getElementById('cs-v');if(v)v.textContent='+ '+CS.pts+' 分';var m=document.getElementById('cs-m');if(m)m.disabled=CS.pts<=1;var p=document.getElementById('cs-p');if(p)p.disabled=CS.pts>=10;}
function submitCS(){addScore(CS.tId,CS.mId,CS.pName,'custom',CS.pts,CS.note||'自訂得分');closeModal();}

// ── Modal ──
function showModal(){var o=document.getElementById('overlay');if(o){o.style.display='flex';setTimeout(function(){o.classList.add('open');},10);}}
function closeModal(){var o=document.getElementById('overlay');if(o){o.classList.remove('open');setTimeout(function(){o.style.display='none';},250);}}

// ── Boot ──
showSync('loading','⏳ 連線中...');
db.ref('/').on('value',function(snapshot){
  var raw=snapshot.val()||{};
  var data=normData(raw);
  S.players=data.players;S.tournaments=data.tournaments;
  if(!_ready){_ready=true;showSync('ok','☁️ 已連線');switchTab('players');}
  else{render();}
},function(){showSync('err','❌ 連線失敗，請重新整理');});

</script>
